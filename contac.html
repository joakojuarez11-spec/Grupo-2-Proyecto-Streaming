<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <section class="contacto">
    <div class="container">

        <div class="titulo-contacto">
            <h2>Contacto</h2>
            <p>¿Tienes alguna duda? Escríbenos y te responderemos.</p>
        </div>

        <div class="contacto-contenido">

            <form class="formulario">

                <label>Nombre</label>
                <input type="text" placeholder="Tu nombre">

                <label>Email</label>
                <input type="email" placeholder="Tu correo">

                <label>Mensaje</label>
                <textarea placeholder="Escribe tu mensaje"></textarea>

                <button type="submit">
                    Enviar mensaje
                </button>

            </form>


            <div class="info-contacto">

                <img src="assets/Logo.png" alt="Logo de la empresa" class="logo-contacto">

                <p>
                    📍 Argentina
                </p>

                <p>
                    📧 contacto@ecostream.com
                </p>

                <p>
                    ☎ +54 381 000000
                </p>

            </div>

        </div>

    </div>
</section>
</body>
</html>
