<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de peliculas</title>
</head>
<body>
    <section class="container-fluid py-5">

    <div class="container">

        <div class="row align-items-center g-4">


            <!-- Imagen Pelicula -->

            <div class="col-12 col-sm-12 col-md-5 col-lg-4">

                <img 
                src="https://via.placeholder.com/500x700"
                class="img-fluid rounded-4 shadow"
                alt="Poster pelicula">

            </div>



            <!-- Informacion -->

            <div class="col-12 col-sm-12 col-md-7 col-lg-8">


                <h1 class="display-4 fw-bold">
                    Nombre de Película
                </h1>


                <div class="d-flex gap-2 flex-wrap my-3">

                    <span class="badge bg-warning text-dark">
                        Acción
                    </span>

                    <span class="badge bg-secondary">
                        2026
                    </span>

                    <span class="badge bg-primary">
                        2h 15min
                    </span>

                </div>



                <p class="fs-5 text-secondary">

                    Una descripción de la película o serie.
                    Aquí va la información principal,
                    historia, personajes y detalles importantes.

                </p>



                <div class="row mt-4">


                    <div class="col-12 col-sm-6 col-md-6 col-lg-4">

                        <h5>Director</h5>

                        <p>
                            Nombre Director
                        </p>

                    </div>



                    <div class="col-12 col-sm-6 col-md-6 col-lg-4">

                        <h5>Reparto</h5>

                        <p>
                            Actor 1, Actor 2
                        </p>

                    </div>


                    <div class="col-12 col-sm-12 col-md-12 col-lg-4">

                        <h5>Idioma</h5>

                        <p>
                            Español
                        </p>

                    </div>


                </div>




                <!-- Botones -->


                <div class="d-flex gap-3 mt-4">


                    <button class="btn btn-lg px-4"
                    style="
                    background:#6A0DAD;
                    color:white;">
                    
                    ▶ Ver ahora

                    </button>



                    <button class="btn btn-lg px-4"
                    style="
                    border:2px solid #FF7A00;
                    color:#FF7A00;">

                    + Mi lista

                    </button>


                </div>


            </div>


        </div>


    </div>


</section>


</body>
</html>
