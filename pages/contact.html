    <main>
        <div class="container-fluid p-2">
            <div class="form-card">
                <form class="was-validated" action="post">
                    <div class="mb-4">
                        <label class="form-label" for="email"> Correo Electrónico </label>
                        <input type="email" id="email" class="form-control" name="email" required
                            pattern="^[0-9a-zA-Z]+([0-9a-zA-Z]*[-._+])*[0-9a-zA-Z]+@[0-9a-zA-Z]+([-.][0-9a-zA-Z]+)*([0-9a-zA-Z]*[.])[a-zA-Z]{2,6}$"
                            placeholder="Ejemplo: usuario@gmail.com" />
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="phone"> Número de Teléfono </label>
                        <input type="tel" id="phone" class="form-control" required
                            pattern="^\+54\s?9?\s?([1-9][0-9]{1,2})\s?\d{7}$" placeholder="+54 11 11 111111" />
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="textarea"> Motivo </label>
                        <textarea class="form-control" id="textarea" style="height: 35vh;"
                            placeholder="Deje un mensaje aquí" required></textarea>
                    </div>
                    <div class="d-flex justify-content-around">
                        <button type="submit" class="btn btn-primary">
                            Enviar
                        </button>
                        <button type="reset" class="btn btn-outline-secondary">
                            Limpiar
                        </button>
                    </div>
                </form>
            </div>
        </div>
        </div>
        </div>
